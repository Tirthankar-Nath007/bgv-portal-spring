spring.application.name=bgv
server.port=8080

# Oracle DataSource
spring.datasource.url=jdbc:oracle:thin:@(DESCRIPTION=(ADDRESS=(PROTOCOL=TCP)(HOST=10.223.0.13)(PORT=1521))(CONNECT_DATA=(SERVICE_NAME=APIUAPDB.uatdbprvsnt.uatvcn.oraclevcn.com)))
spring.datasource.username=${ORACLE_USER:DEV_5077947}
spring.datasource.password=${ORACLE_PASSWORD:Deadlock@123456}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway — all tables already exist; baseline so Flyway records the starting point
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# Swagger / SpringDoc
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT
app.jwt.secret=${JWT_SECRET:bgv-portal-super-secret-jwt-key-2024-minimum-32-chars}
app.jwt.expiration-ms=604800000

# Mail (SMTP)
spring.mail.host=${SMTP_HOST:10.221.0.18}
spring.mail.port=${SMTP_PORT:25}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.trust=*

# App config
app.admin.email=${ADMIN_EMAIL:Tirthankar.Nath@tvscredit.com}
app.mail.from=${SMTP_FROM_EMAIL:exitsupport-uat@tvscredit.com}
app.base-url=${BASE_URL:http://localhost:8080}
app.verification.max-attempts=3
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}
